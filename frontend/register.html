<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – TaskManager</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .input-wrap { position: relative; }
    .input-wrap input { width: 100%; padding-right: 44px; }
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0;
      display: flex;
      align-items: center;
    }
    .eye-btn:hover { color: var(--text); }
  </style>
</head>
<body data-page="register">
  <div class="page-center">
    <div class="container">
      <div class="card">

        <div class="brand">
          <div class="brand-icon">✦</div>
          <div class="brand-name">Task<span>Manager</span></div>
        </div>

        <h1 class="page-title">Create account</h1>
        <p class="page-sub">Start managing your tasks today.</p>

        <div class="alert" id="alert"></div>

        <form id="register-form" autocomplete="off">

          <div class="form-group">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="e.g. vishnu" required minlength="3" maxlength="50" />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="e.g. vishnu@gmail.com" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <input id="password" type="password" placeholder="Min. 8 characters" required minlength="6" />
              <button type="button" class="eye-btn" onclick="togglePass('password', this)">
                <!-- Eye open (show when password hidden) -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <!-- Eye crossed (show when password visible) -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <!-- Password Strength -->
          <div class="form-group">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
              <span style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.6px;">Password Strength</span>
              <span id="strength-text" style="font-size:12px;font-weight:600;"></span>
            </div>
            <div style="background:var(--border);border-radius:4px;height:4px;">
              <div id="strength-bar" style="height:4px;border-radius:4px;width:0%;transition:all 0.3s ease;"></div>
            </div>
            <div id="strength-hints"></div>
          </div>

          <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <div class="input-wrap">
              <input id="confirm" type="password" placeholder="Repeat password" required />
              <button type="button" class="eye-btn" onclick="togglePass('confirm', this)">
                <!-- Eye open -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <!-- Eye crossed -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <button class="btn btn-primary" id="submit-btn" data-label="Create Account" type="submit">
            Create Account
          </button>

        </form>

        <div class="link-row">
          Already have an account? <a href="login.html">Sign in</a>
        </div>

      </div>
    </div>
  </div>

  <script>
    function togglePass(fieldId, btn) {
      const field = document.getElementById(fieldId);
      const svgs = btn.querySelectorAll('svg');
      if (field.type === 'password') {
        field.type = 'text';
        svgs[0].style.display = 'block'; // show open eye
        svgs[1].style.display = 'none';  // hide crossed eye
      } else {
        field.type = 'password';
        svgs[0].style.display = 'none';  // hide open eye
        svgs[1].style.display = 'block'; // show crossed eye
      }
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
