<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – TaskManager</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .input-wrap { position: relative; }
    .input-wrap input { width: 100%; padding-right: 44px; }
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0;
      display: flex;
      align-items: center;
    }
    .eye-btn:hover { color: var(--text); }
  </style>
</head>
<body data-page="login">
  <div class="page-center">
    <div class="container">
      <div class="card">

        <div class="brand">
          <div class="brand-icon">✦</div>
          <div class="brand-name">Task<span>Manager</span></div>
        </div>

        <h1 class="page-title">Welcome back</h1>
        <p class="page-sub">Sign in to access your tasks.</p>

        <div class="alert" id="alert"></div>

        <form id="login-form" autocomplete="off">

          <div class="form-group">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="e.g. vishnu" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <input id="password" type="password" placeholder="Your password" required />
              <button type="button" class="eye-btn" onclick="togglePass('password', this)">
                <!-- Eye open -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <!-- Eye crossed -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <button class="btn btn-primary" id="submit-btn" data-label="Sign In" type="submit">
            Sign In
          </button>

        </form>

        <div class="link-row">
          No account? <a href="register.html">Create one</a>
        </div>

      </div>
    </div>
  </div>

  <script>
    function togglePass(fieldId, btn) {
      const field = document.getElementById(fieldId);
      const svgs = btn.querySelectorAll('svg');
      if (field.type === 'password') {
        field.type = 'text';
        svgs[0].style.display = 'block';
        svgs[1].style.display = 'none';
      } else {
        field.type = 'password';
        svgs[0].style.display = 'none';
        svgs[1].style.display = 'block';
      }
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
